spring.application.name=building-climate-control
spring.datasource.url=jdbc:postgresql://localhost:5432/building_climate_control
spring.datasource.username=admin
spring.datasource.password=admin

spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# temperature recalculation
simulation.interval.ms=10000
temperature.threshold=0.5f
temperature.coolingRate=0.2f